services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-workflows-platform
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      HOSTNAME: 0.0.0.0
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://aiworkflows.dev}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
