name: Daily Hub Feed Update

on:
  schedule:
    # 00:30 UTC = 6:00 AM IST
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update all daily feeds (6 AM IST)
        run: python scripts/fetch-daily-hub.py

      - name: Commit hub content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/news.json content/learning.json content/analytics.json content/web-ideas.json
          git diff --staged --quiet || git commit -m "chore: daily hub update (news, learning, analytics, ideas)"
          git push
